# Equivalent to pnpm-workspace.yaml `packages:`
packages:
  - documentation

# Force specific versions of any dependency (including transitive)
overrides:
  vite: catalog:build

packageExtensions:
  "@astrojs/mdx@7.0.0":
    dependencies:
      satteri: 0.9.2
      "@astrojs/starlight": 0.41.1

# Block exotic sub-dependencies (e.g. git, file: deps)
blockExoticSubdeps: true
strictSsl: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080
trustPolicyExclude:
  - skills

# Only allow specific packages to run install scripts
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: true

strictDepBuilds: true
strictPeerDependencies: true

# Global virtual store (pnpm's node_modules/.pnpm equivalent)
enableGlobalVirtualStore: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@astrojs/markdown-satteri"
  - "@astrojs/starlight"
  - "@biomejs/biome"
  - "@biomejs/cli-darwin-arm64"
  - "@biomejs/cli-darwin-x64"
  - "@biomejs/cli-linux-arm"
  - "@biomejs/cli-linux-arm64"
  - "@biomejs/cli-linux-arm64-musl"
  - "@biomejs/cli-linux-x64"
  - "@biomejs/cli-linux-x64-musl"
  - "@biomejs/cli-win32-arm64"
  - "@biomejs/cli-win32-x64"
  - "@expressive-code/core"
  - "@expressive-code/plugin-frames"
  - "@expressive-code/plugin-shiki"
  - "@expressive-code/plugin-text-markers"
  - "@oxfmt/binding-android-arm-eabi"
  - "@oxfmt/binding-android-arm64"
  - "@oxfmt/binding-darwin-arm64"
  - "@oxfmt/binding-darwin-x64"
  - "@oxfmt/binding-freebsd-x64"
  - "@oxfmt/binding-linux-arm-gnueabihf"
  - "@oxfmt/binding-linux-arm-musleabihf"
  - "@oxfmt/binding-linux-arm64-gnu"
  - "@oxfmt/binding-linux-arm64-musl"
  - "@oxfmt/binding-linux-ppc64-gnu"
  - "@oxfmt/binding-linux-riscv64-gnu"
  - "@oxfmt/binding-linux-riscv64-musl"
  - "@oxfmt/binding-linux-s390x-gnu"
  - "@oxfmt/binding-linux-x64-gnu"
  - "@oxfmt/binding-linux-x64-musl"
  - "@oxfmt/binding-openharmony-arm64"
  - "@oxfmt/binding-win32-arm64-msvc"
  - "@oxfmt/binding-win32-ia32-msvc"
  - "@oxfmt/binding-win32-x64-msvc"
  - "@typescript/native-preview"
  - "@typescript/native-preview-darwin-arm64"
  - "@typescript/native-preview-darwin-x64"
  - "@typescript/native-preview-linux-arm"
  - "@typescript/native-preview-linux-arm64"
  - "@typescript/native-preview-linux-x64"
  - "@typescript/native-preview-win32-arm64"
  - "@typescript/native-preview-win32-x64"
  - "@yuku-parser/binding-darwin-arm64"
  - "@yuku-parser/binding-darwin-x64"
  - "@yuku-parser/binding-freebsd-x64"
  - "@yuku-parser/binding-linux-arm-gnu"
  - "@yuku-parser/binding-linux-arm-musl"
  - "@yuku-parser/binding-linux-arm64-gnu"
  - "@yuku-parser/binding-linux-arm64-musl"
  - "@yuku-parser/binding-linux-x64-gnu"
  - "@yuku-parser/binding-linux-x64-musl"
  - "@yuku-parser/binding-win32-arm64"
  - "@yuku-parser/binding-win32-x64"
  - "@yuku-parser/binding-linux-arm-gnu@0.6.1"
  - "@yuku-parser/binding-linux-arm-musl@0.6.1"
  - astro
  - astro-expressive-code
  - expressive-code
  - oxfmt
  - oxlint
  - oxlint-plugin-utilities
  - rehype-expressive-code
  - skills
  - yuku-parser@0.6.1

minimumReleaseAgeStrict: true

# Use time-based resolution for reproducible installs
resolutionMode: time-based

fetchRetries: 5
fetchRetryMintimeout: 1000
fetchRetryMaxtimeout: 30000
fetchTimeout: 60000

strictStorePkgContentCheck: true
verifyStoreIntegrity: true

catalogs:
  build:
    tsdown: 0.22.5
    vite: ^8
  dev:
    "@cliffy/command": npm:@jsr/cliffy__command@1.2.1
    "@commitlint/config-conventional": 21.2.0
    "@commitlint/types": 21.2.0
    "@octokit/rest": 22.0.1
    "@std/msgpack": npm:@jsr/std__msgpack@1.0.3
    "@stryker-mutator/api": 9.6.1
    "@stryker-mutator/core": 9.6.1
    "@typescript/native-preview": 7.0.0-dev.20260707.2
    "@vitiate/core": 0.3.1
    "@vitiate/fuzzed-data-provider": 0.3.1
    bumpp: 11.1.0
    changelogithub: 14.0.0
    commitlint: 21.2.1
    fast-check: 4.9.0
    fdir: 6.5.0
    get-tsconfig: 4.14.0
    jiti: 2.7.0
    jscpd: 5.0.12
    jsonc-parser: 3.3.1
    just-diff: 6.0.2
    mutative: 1.3.0
    oxfmt: 0.58.0
    oxlint: 1.73.0
    oxlint-tsgolint: 0.24.0
    picocolors: 1.1.1
    sfw: 2.0.6
    skills: 1.5.16
    type-fest: 5.8.0
    typescript: 5.9.3
    vitiate: 0.3.1
    zx: 8.8.5
  frontend:
    "@astrojs/react": 6.0.0
    react: 19.2.7
    react-dom: 19.2.7
  lint:
    "@biomejs/biome": 2.5.3
    eslint: 10.7.0
    eslint-plugin-antfu: 3.2.3
    eslint-plugin-regexp: 3.1.1
    eslint-plugin-sonarjs: 4.1.0
    eslint-plugin-unused-imports: 4.4.1
    knip: 6.26.0
  prod:
    "@astrojs/markdown-satteri": 0.3.2
    "@astrojs/mdx": 7.0.0
    "@astrojs/starlight": 0.41.1
    astro: 7.0.3
    ignore: 7.0.6
    minimatch: 10.2.5
    oxc-resolver: 11.23.0
    oxlint-plugin-utilities: 1.1.0
    satteri: 0.9.2
    sharp: 0.34.5
    yuku-parser: 0.6.1
  test:
    "@fast-check/vitest": 0.4.1
    "@stryker-mutator/vitest-runner": 9.6.1
    "@vitest/coverage-v8": 4.1.10
    confbox: 0.2.4
    vitest: 4.1.10
  types:
    "@types/bun": 1.3.14
    "@types/node": "25"
    "@types/react": 19.2.17
    "@types/react-dom": 19.2.3

catalog:
  "@total-typescript/ts-reset": 0.6.1
  arktype: 2.2.3
  pncat: 0.12.0
  vite-tsconfig-paths: 6.1.1
