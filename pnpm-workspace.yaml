    eslint-plugin-unused-imports: 4.4.1
    knip: 6.25.0
  prod:
    arktype: 2.2.3
    ignore: 7.0.5
    minimatch: 10.2.5
    oxc-parser: 0.139.0
    oxc-resolver: 11.23.0
    oxlint-plugin-utilities: 1.1.0
  test:
    "@fast-check/vitest": 0.4.1
    "@stryker-mutator/vitest-runner": 9.6.1
    "@vitest/coverage-v8": 4.1.10
    vitest: 4.1.10
  types:
    "@types/bun": 1.3.14
    "@types/node": "25"
