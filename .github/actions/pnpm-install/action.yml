name: pnpm install
description: >-
  Set up the toolchain via Mise and run `pnpm install --frozen-lockfile` with
  the pnpm store cached. pnpm and Node.js come from mise.toml (pnpm is locked
  to the same version as `packageManager` in package.json).

inputs:
  mise-install-args:
    description: Arguments forwarded to `mise install`; defaults provision pnpm, bun, and node.
    required: false
    default: "pnpm bun node"

runs:
  using: composite
  steps:
    - name: Setup Mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        install_args: ${{ inputs.mise-install-args }}

    - name: Resolve pnpm store path
      id: store-path
      shell: bash
      # Use a heredoc-style write to scope the value to a single key, so
      # nothing in `pnpm store path` can inject additional env entries.
      run: |
        {
          echo "STORE_PATH<<__PNPM_STORE_PATH__"
          pnpm store path --silent
          echo "__PNPM_STORE_PATH__"
        } >> "$GITHUB_ENV"

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-v2-

    - name: Install dependencies
      shell: bash
      env:
        CI: "true"
      run: |
        for attempt in 1 2 3; do
          if pnpm install --frozen-lockfile --prefer-offline; then
            break
          fi
          if [ "$attempt" = "3" ]; then
            echo "::error title=pnpm install failed::pnpm install --frozen-lockfile did not succeed after 3 attempts." >&2
            exit 1
          fi
          sleep $((attempt * 10))
        done
