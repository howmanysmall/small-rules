name: Setup toolchain
description: Install the project toolchain.

inputs:
  cache:
    description: Enable Mise caching.
    required: false
    default: "true"
  tools:
    description: Space-separated Mise tools to install.
    required: false
    default: "bun node pnpm"

runs:
  using: composite
  steps:
    - name: Setup Mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        install_args: ${{ inputs.tools }}
        cache: ${{ inputs.cache }}
