name: CI

on:
  push:
    branches:
      - main
    paths: &ci-paths
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths: *ci-paths

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build
            command: node --run build -- --minify
          - name: Biome
            command: node --run biome -- ci
          - name: Lint
            command: node --run oxlint
          - name: Type Check
            command: node --run type-check
          - name: Knip
            command: node --run knip
          - name: Test
            command: node --run test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}
