name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"
      - ".github/actions/**"
  pull_request:
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"
      - ".github/actions/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/actions/pnpm-install

      - name: Build
        run: nr build

  biome:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/actions/pnpm-install

      - name: Biome CI
        run: nr biome ci

  lint:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/actions/pnpm-install

      - name: Lint
        run: nr oxlint .

  type-check:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/actions/pnpm-install

      - name: Type Checking
        run: nr type-check

  knip:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/actions/pnpm-install

      - name: Knip
        run: nr knip

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/actions/pnpm-install

      - name: Test
        run: nr test
