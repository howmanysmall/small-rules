name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "aube-lock.yaml"
      - "aube-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "aube-lock.yaml"
      - "aube-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Mise
        uses: jdx/mise-action@v2

      - name: Cache Aube store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/aube/store
            ~/.cache/aube
          key: ${{ runner.os }}-aube-v3-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-v3-

      - name: Install
        run: |
          for attempt in 1 2 3; do
            if aube install --frozen-lockfile; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Biome CI
        run: nr biome ci

      - name: Lint
        run: nr oxlint .

      - name: Type Checking
        run: nr type-check

      - name: Knip
        run: nr knip

      - name: Build
        run: nr build

      - name: Test
        run: nr test
