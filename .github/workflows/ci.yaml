name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: |
          pnpm install
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Build
        run: nr build

  biome:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: |
          pnpm install
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Biome CI
        run: nr biome ci

  lint:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: |
          pnpm install
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Lint
        run: nr oxlint .

  type-check:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: |
          pnpm install
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Type Checking
        run: nr type-check

  knip:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: |
          pnpm install
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Knip
        run: nr knip

  test:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node pnpm"

      - name: Install
        run: |
          pnpm install
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Test
        run: nr test
