name: CI

on:
  push:
    branches:
      - main
    paths: &ci-paths
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.json"
      - "tests/**"
      - "documentation/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/actions/**"
      - ".github/workflows/checks.yaml"
      - ".github/workflows/ci.yaml"
      - ".github/workflows/docs.yaml"
  pull_request:
    paths: *ci-paths

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  checks:
    uses: ./.github/workflows/checks.yaml
    permissions:
      contents: read

  deploy-documentation:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    uses: ./.github/workflows/docs.yaml
    permissions:
      contents: read
      pages: write
      id-token: write
