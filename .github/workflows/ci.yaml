name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "aube-lock.yaml"
      - "aube-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "src/**/*.{ts,tsx,json}"
      - "tests/**"
      - "scripts/**"
      - "patches/**"
      - "package.json"
      - "aube-lock.yaml"
      - "aube-workspace.yaml"
      - "mise.toml"
      - "mise.lock"
      - "*.config.ts"
      - "tsconfig*.json"
      - ".ox*trc.json"
      - "biome.jsonc"
      - ".github/workflows/ci.yaml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AUBE_STRICT_STORE_PKG_CONTENT_CHECK: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "aube bun node"

      - name: Cache Aube store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.local/share/aube/store
            ~/.cache/aube
          key: ${{ runner.os }}-aube-v3-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-v3-

      - name: Install
        run: |
          for attempt in 1 2 3; do
            if aube install --fix-lockfile; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          git diff --exit-code package.json aube-lock.yaml

      - name: Build
        run: nr build

      - name: Archive workspace
        run: tar -czf workspace.tar.gz node_modules dist

      - name: Upload workspace
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: workspace
          path: workspace.tar.gz
          retention-days: 1

  biome:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node"

      - name: Download workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xzf workspace.tar.gz

      - name: Biome CI
        run: nr biome ci

  lint:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node"

      - name: Download workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xzf workspace.tar.gz

      - name: Lint
        run: nr oxlint .

  type-check:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node"

      - name: Download workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xzf workspace.tar.gz

      - name: Type Checking
        run: nr type-check

  knip:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node"

      - name: Download workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xzf workspace.tar.gz

      - name: Knip
        run: nr knip

  test:
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install_args: "bun node"

      - name: Download workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xzf workspace.tar.gz

      - name: Test
        run: nr test
