name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip publish & release creation"
        type: boolean
        required: false
        default: true

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      actions: read # For waiting on the matching main-branch CI run
      contents: write # For creating GitHub releases
      id-token: write # Required for NPM Trusted Publishing (OIDC)
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine dry run flag
        run: |
          DRY_RUN="false"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VALUE=$(jq -r '.inputs.dry_run // "true"' "$GITHUB_EVENT_PATH")
            if [ "$VALUE" != "false" ]; then
              DRY_RUN="true"
            fi
          fi
          echo "DRY_RUN=$DRY_RUN" >> "$GITHUB_ENV"

      - name: Require tag for real release
        if: ${{ env.DRY_RUN != 'true' && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "::error title=Refusing non-tag publish::Run this workflow from a v*.*.* tag, or enable dry_run." >&2
          exit 1

      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error title=Version mismatch::Tag $TAG_VERSION does not match package.json $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Verify tag commit reachable from main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is on main lineage"
          else
            echo "::error title=Tag not on main::Tag commit $GITHUB_SHA not reachable from main" >&2
            exit 1
          fi

      - name: Setup toolchain
        uses: ./.github/actions/setup
        with:
          cache: false

      - name: Setup Node.js for NPM publishing
        if: ${{ env.DRY_RUN != 'true' }}
        # This step is only here to configure the NPM registry URL.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Wait for CI
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_RUN_ID=""
          for _ in $(seq 1 60); do
            CI_RUN_ID=$(gh run list --workflow ci.yaml --commit "$GITHUB_SHA" --event push --limit 1 --json databaseId --jq '.[0].databaseId // empty')
            if [ -n "$CI_RUN_ID" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$CI_RUN_ID" ]; then
            echo "::error title=CI run not found::No main-branch CI run found for $GITHUB_SHA" >&2
            exit 1
          fi
          gh run watch "$CI_RUN_ID" --exit-status

      - name: Dry-run package build
        if: ${{ env.DRY_RUN == 'true' }}
        run: node --run build -- --minify

      - name: Generate release notes
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"
          node --run changelogithub -- --to "$GITHUB_REF_NAME" --output "$RELEASE_NOTES"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> "$GITHUB_ENV"

      - name: Commit release notes to main
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_WORKTREE="$RUNNER_TEMP/release-main"
          git fetch origin main
          git worktree add --detach "$RELEASE_WORKTREE" origin/main
          RELEASE_ARTIFACT="$RELEASE_WORKTREE/documentation/src/content/releases/$GITHUB_REF_NAME.md"

          if [ -f "$RELEASE_ARTIFACT" ]; then
            if cmp --silent "$RELEASE_NOTES" "$RELEASE_ARTIFACT"; then
              echo "Release notes already match $GITHUB_REF_NAME"
              exit 0
            fi
            echo "::error title=Release notes differ::Refusing to overwrite $RELEASE_ARTIFACT" >&2
            exit 1
          fi

          mkdir -p "$(dirname "$RELEASE_ARTIFACT")"
          cp "$RELEASE_NOTES" "$RELEASE_ARTIFACT"
          git -C "$RELEASE_WORKTREE" config user.name "github-actions[bot]"
          git -C "$RELEASE_WORKTREE" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$RELEASE_WORKTREE" add "$RELEASE_ARTIFACT"
          git -C "$RELEASE_WORKTREE" commit -m "chore(docs): add $GITHUB_REF_NAME release notes"
          gh auth setup-git
          git -C "$RELEASE_WORKTREE" push origin HEAD:main

      - name: Publish to NPM (Trusted Publishing)
        if: ${{ env.DRY_RUN != 'true' }}
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Create or update GitHub release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --notes-file "$RELEASE_NOTES"
          else
            gh release create "$GITHUB_REF_NAME" --notes-file "$RELEASE_NOTES" --title "$GITHUB_REF_NAME"
          fi

      - name: Upload npm debug log on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: npm-debug-log
          path: /home/runner/.npm/_logs/*.log

      - name: Dry-run summary
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          echo "Dry run: skipped release notes, publish, and GitHub release creation."

  deploy-documentation:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: publish
    uses: ./.github/workflows/docs.yaml
    with:
      ref: main
    permissions:
      contents: read
      pages: write
      id-token: write
