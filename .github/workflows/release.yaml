name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip publish & release creation"
        type: boolean
        required: false
        default: true

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      actions: read # For waiting on the matching main-branch CI run
      contents: write # For creating GitHub releases
      id-token: write # Required for NPM Trusted Publishing (OIDC)
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine dry run flag
        run: |
          DRY_RUN="false"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VALUE=$(jq -r '.inputs.dry_run // "true"' "$GITHUB_EVENT_PATH")
            if [ "$VALUE" != "false" ]; then
              DRY_RUN="true"
            fi
          fi
          echo "DRY_RUN=$DRY_RUN" >> "$GITHUB_ENV"

      - name: Require tag for real release
        if: ${{ env.DRY_RUN != 'true' && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "::error title=Refusing non-tag publish::Run this workflow from a v*.*.* tag, or enable dry_run." >&2
          exit 1

      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error title=Version mismatch::Tag $TAG_VERSION does not match package.json $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Verify tag commit reachable from main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is on main lineage"
          else
            echo "::error title=Tag not on main::Tag commit $GITHUB_SHA not reachable from main" >&2
            exit 1
          fi

      - name: Setup toolchain
        uses: ./.github/actions/setup
        with:
          cache: false

      - name: Setup Node.js for NPM publishing
        if: ${{ env.DRY_RUN != 'true' }}
        # This step is only here to configure the NPM registry URL.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Wait for CI
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_RUN_ID=""
          for _ in $(seq 1 60); do
            CI_RUN_ID=$(gh run list --workflow ci.yaml --commit "$GITHUB_SHA" --event push --limit 1 --json databaseId --jq '.[0].databaseId // empty')
            if [ -n "$CI_RUN_ID" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$CI_RUN_ID" ]; then
            echo "::error title=CI run not found::No main-branch CI run found for $GITHUB_SHA" >&2
            exit 1
          fi
          gh run watch "$CI_RUN_ID" --exit-status

      - name: Dry-run package build
        if: ${{ env.DRY_RUN == 'true' }}
        run: node --run build -- --minify

      - name: Publish to NPM (Trusted Publishing)
        if: ${{ env.DRY_RUN != 'true' }}
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Generate changelog & GitHub release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node --run changelogithub

      - name: Upload npm debug log on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-debug-log
          path: /home/runner/.npm/_logs/*.log

      - name: Dry-run summary
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          echo "Dry run: skipped changelog + publish. Validation completed."
