name: Checks

on:
  workflow_call:

permissions: {}

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build
            command: node --run build -- --minify && test -f dist/index.js
          - name: Biome
            command: node --run biome -- ci
          - name: Lint
            command: node --run oxlint
          - name: Type Check
            command: node --run type-check
          - name: Knip
            command: node --run knip
          - name: Test
            command: node --run test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}
